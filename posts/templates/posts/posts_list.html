{% extends "layout.html" %}

{% block title %}
   Posts
{% endblock %}

{% block  content%}
  <h1 style="margin-bottom: 1rem;">Posts</h1>

  {% for post in posts %}
   <article class="post">
        <h2>
          <a href="{% url 'posts:page' slug=post.slug %}">
           {{ post.title }}
          </a>
        </h2>
        <p>{{ post.body }}</p>
        <p>{{ post.date }} by {{ post.author }}</p>
   </article>
{% endfor %}

{% endblock  %}
